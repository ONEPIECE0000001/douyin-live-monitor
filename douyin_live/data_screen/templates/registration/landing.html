<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>抖音直播全链路监控平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0b0f19; color:#e2e8f0;
      font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;
      overflow-x:hidden;
    }
    /* 星空粒子背景 */
    .stars {
      position:fixed; inset:0; z-index:0; pointer-events:none;
    }
    .star {
      position:absolute; border-radius:50%;
      background:#fff; opacity:0;
      animation: twinkle var(--dur) ease-in-out infinite;
      animation-delay: var(--delay);
    }
    @keyframes twinkle {
      0%,100% { opacity:0; transform:scale(0.5); }
      10%,90% { opacity:var(--alpha); }
      50%     { opacity:1; transform:scale(1.3); }
    }
    /* 网格线 */
    .grid-bg {
      position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 80px 80px;
      animation: gridMove 20s linear infinite;
    }
    @keyframes gridMove {
      0% { background-position:0 0, 0 0; }
      100% { background-position:80px 80px, 80px 80px; }
    }

    /* 呼吸发光按钮 */
    .hero-btn {
      display:inline-flex; align-items:center; gap:10px;
      padding:16px 48px; border:none; border-radius:16px;
      background:linear-gradient(135deg, #06b6d4, #3b82f6);
      color:#fff; font-size:17px; font-weight:700; letter-spacing:3px;
      cursor:pointer; text-decoration:none;
      box-shadow:0 0 32px rgba(6,182,212,0.3), 0 4px 16px rgba(59,130,246,0.2);
      animation: glowPulse 2.5s ease-in-out infinite;
      transition:all 0.3s;
    }
    .hero-btn:hover {
      transform:translateY(-2px);
      box-shadow:0 0 48px rgba(6,182,212,0.5), 0 8px 24px rgba(59,130,246,0.3);
    }
    @keyframes glowPulse {
      0%,100% { box-shadow:0 0 32px rgba(6,182,212,0.3), 0 4px 16px rgba(59,130,246,0.2); }
      50%     { box-shadow:0 0 56px rgba(6,182,212,0.5), 0 4px 24px rgba(59,130,246,0.35); }
    }
  </style>
</head>
<body>

<!-- 星空粒子 -->
<div class="stars" id="stars"></div>
<!-- 移动网格 -->
<div class="grid-bg"></div>

<!-- 主内容 -->
<div style="position:relative; z-index:1; display:flex; flex-direction:column;
            align-items:center; justify-content:center; min-height:100vh; padding:40px 24px;">

  <!-- Logotype -->
  <div style="margin-bottom:40px; display:flex; align-items:center; gap:14px;">
    <div style="width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;
                background:linear-gradient(135deg,#06b6d4,#3b82f6);font-size:26px;box-shadow:0 0 24px rgba(6,182,212,0.3);">
      📡
    </div>
  </div>

  <!-- 核心文案 -->
  <h1 style="font-size:clamp(32px,6vw,64px); font-weight:800; letter-spacing:-0.02em;
             text-align:center; line-height:1.15; margin-bottom:20px;
             background:linear-gradient(135deg,#e2e8f0 0%,#94a3b8 50%,#38bdf8 100%);
             -webkit-background-clip:text; -webkit-text-fill-color:transparent;">
    抖音直播全链路监控平台
  </h1>
  <p style="font-size:clamp(15px,2vw,18px); color:#64748b; text-align:center;
            letter-spacing:1px; max-width:600px; margin-bottom:56px;">
    毫秒级数据解析 · 情感极性计算 · RF 流量预测
  </p>

  <!-- CTA 按钮 -->
  <a href="{% url 'login' %}" class="hero-btn">
    <span>进入控制台</span>
    <span style="font-size:20px;">→</span>
  </a>

  <!-- 底部指标 -->
  <div style="display:flex; gap:48px; margin-top:80px; flex-wrap:wrap; justify-content:center;">
    <div style="text-align:center;">
      <div style="font-size:28px;font-weight:800;color:#38bdf8;">&lt;10ms</div>
      <div style="font-size:12px;color:#475569;margin-top:4px;">端到端延迟</div>
    </div>
    <div style="text-align:center;">
      <div style="font-size:28px;font-weight:800;color:#a78bfa;">99.7%</div>
      <div style="font-size:12px;color:#475569;margin-top:4px;">系统可用性</div>
    </div>
    <div style="text-align:center;">
      <div style="font-size:28px;font-weight:800;color:#34d399;">24/7</div>
      <div style="font-size:12px;color:#475569;margin-top:4px;">无人值守挂机</div>
    </div>
  </div>

  <!-- Footer -->
  <div style="position:absolute; bottom:24px; color:#334155; font-size:12px; letter-spacing:1px;">
    Douyin Live Monitoring Platform © 2026
  </div>
</div>

<!-- 生成星空粒子 -->
<script>
(function(){
  var container = document.getElementById('stars');
  var count = 80;
  for(var i=0; i<count; i++){
    var s = document.createElement('div');
    s.className = 'star';
    var size = Math.random()*3+1;
    s.style.cssText =
      'width:'+size+'px;height:'+size+'px;'+
      'left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;'+
      '--dur:'+(Math.random()*4+3)+'s;'+
      '--delay:'+(Math.random()*5)+'s;'+
      '--alpha:'+(Math.random()*0.5+0.15)+';';
    container.appendChild(s);
  }
})();
</script>
</body>
</html>
